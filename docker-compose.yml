services:
  agenda-app:

    build:
      context: .
      dockerfile: Dockerfile
    
    image: m324-agenda-app:v1.0.0
    container_name: agenda_web_prod
    ports:
      - "8080:8080"

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    security_opt:
      - no-new-privileges:true