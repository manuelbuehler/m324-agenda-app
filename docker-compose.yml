services:
  agenda-app:

    build:
      context: .
      dockerfile: Dockerfile
    
    image: ghcr.io/manuelbuehler/m324-agenda-app:main
    container_name: agenda_web_prod
    ports:
      - "8080:8080"

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    security_opt:
      - no-new-privileges:true